<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>DOM PIĘKNA — Stylizacja Paznokci | Tarnobrzeg</title>
    <meta name="description" content="Salon stylizacji paznokci w Tarnobrzegu. Umów wizytę u Natalii lub Klaudii. Ul. Józefa Piłsudskiego 10D, 39-400 Tarnobrzeg.">

    <!-- Open Graph -->
    <meta property="og:title" content="DOM PIĘKNA — Stylizacja Paznokci">
    <meta property="og:description" content="Salon stylizacji paznokci w Tarnobrzegu. Rezerwacje u Natalii i Klaudii.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pl_PL">

    <!-- Favicon placeholder -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Główna paleta - jasny motyw */
            --gold: #C5A059;
            --gold-light: #E8D3A2;
            
            --bg-gradient-start: #ffffff;
            --bg-gradient-end: #FDFBF7;
            --bg-color: #FDFBF7;
            
            --card-bg: #FFFFFF;
            --card-hover-bg: #fffcf5;
            
            --text-main: #2C2C2C;
            --text-muted: #71717A;
            
            --border-color: rgba(197, 160, 89, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.02);
            --shadow-color-hover: rgba(197, 160, 89, 0.1);
            
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Subtelny ciemny motyw */
        @media (prefers-color-scheme: dark) {
            :root {
                /* Delikatnie jaśniejsze złoto dla lepszego kontrastu w ciemności */
                --gold: #D4B572; 
                --gold-light: #E8D3A2;
                
                /* Głębokie, ciepłe brązy/taupe zamiast agresywnej czerni */
                --bg-gradient-start: #332C25;
                --bg-gradient-end: #26211B;
                --bg-color: #26211B;
                
                /* Tło kart nieznacznie jaśniejsze od tła głównego */
                --card-bg: #3D352D;
                --card-hover-bg: #4A4137;
                
                /* Złamana, ciepła biel i zgaszony beż */
                --text-main: #F0EBE1;
                --text-muted: #A89F93;
                
                --border-color: rgba(212, 181, 114, 0.15);
                --shadow-color: rgba(0, 0, 0, 0.2);
                --shadow-color-hover: rgba(212, 181, 114, 0.15);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            padding: 2rem 0;
            transition: background-color 0.4s ease, background-image 0.4s ease, color 0.4s ease;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 1rem 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 1;
        }

        /* Sekcja główna */
        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Etykiety nad kafelkami */
        .profile-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .profile-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Linki i przyciski */
        .ig-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: var(--transition-smooth);
            padding: 1.2rem;
            border-radius: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
            width: 100%;
        }

        .ig-link:hover,
        .ig-link:focus-visible {
            transform: translateY(-5px);
            border-color: rgba(197, 160, 89, 0.5);
            background: var(--card-hover-bg);
            box-shadow: 0 10px 30px var(--shadow-color-hover);
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        .ig-link svg {
            width: 32px;
            height: 32px;
            fill: var(--gold);
            transition: var(--transition-smooth);
        }

        .ig-link span {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Tekst rozdzielający */
        .divider-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--gold);
            position: relative;
            padding: 1rem 0;
            margin: -0.5rem 0;
        }

        .divider-text::before,
        .divider-text::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background: var(--border-color);
        }

        .divider-text::before { top: 0; }
        .divider-text::after { bottom: 0; }

        /* Sekcja zespołu */
        .team-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stylist-column {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .phone-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.8rem;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: var(--transition-smooth);
        }

        .phone-link:hover,
        .phone-link:focus-visible {
            color: var(--gold);
            border-color: rgba(197, 160, 89, 0.4);
            background: var(--card-hover-bg);
            transform: translateY(-2px);
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        .phone-link svg {
            width: 14px;
            height: 14px;
            fill: var(--gold);
            flex-shrink: 0;
        }

        /* Sekcja adresu i mapy */
        .location-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .address-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.2rem;
            border-radius: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            text-decoration: none;
            transition: var(--transition-smooth);
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .address-card:hover,
        .address-card:focus-visible {
            border-color: rgba(197, 160, 89, 0.4);
            background: var(--card-hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--shadow-color-hover);
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        .address-card svg {
            width: 32px;
            height: 32px;
            fill: var(--gold);
            flex-shrink: 0;
        }

        .address-details {
            text-align: center;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .address-details strong {
            color: var(--text-main);
            font-weight: 600;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 2px;
        }

        .address-hint {
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
            opacity: 0.8;
        }

        .map-container {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg); /* zabezpieczenie przed białym mignięciem */
        }

        /* Przyciemnienie i ocieplenie kafelków mapy w ciemnym motywie */
        @media (prefers-color-scheme: dark) {
            .leaflet-layer,
            .leaflet-control-zoom-in,
            .leaflet-control-zoom-out,
            .leaflet-control-attribution {
                /* Specjalny filtr nadający mapie ciepły, ciemny charakter */
                filter: grayscale(20%) invert(90%) sepia(15%) hue-rotate(180deg) brightness(95%);
            }
        }

        /* Nadpisanie domyślnych stylów Leaflet dla spójności */
        .leaflet-container {
            font-family: 'Montserrat', sans-serif !important;
            background: var(--card-bg) !important;
        }

        .leaflet-popup-content-wrapper {
            background: var(--card-bg) !important;
            color: var(--text-main) !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2) !important;
            border: 1px solid var(--border-color);
        }

        .leaflet-popup-tip {
            background: var(--card-bg) !important;
        }

        .leaflet-popup-content {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 500;
            margin: 12px !important;
        }

        /* Animacje wejścia */
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }
        .delay-7 { animation-delay: 0.7s; }

        /* Dostępność — reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .fade-in-up {
                animation: none;
                opacity: 1;
                transform: none;
            }
            * {
                transition-duration: 0.01ms !important;
            }
        }

        @media (max-width: 350px) {
            h1 { font-size: 2rem; }
            .team-section { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Definicje ikon SVG (odchudzone) -->
    <svg style="display: none;" aria-hidden="true">
        <symbol id="icon-instagram" viewBox="0 0 24 24">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </symbol>
        <symbol id="icon-location" viewBox="0 0 24 24">
            <path d="M12 0c-4.198 0-8 3.403-8 7.602 0 4.198 3.469 9.21 8 16.398 4.531-7.188 8-12.2 8-16.398 0-4.199-3.801-7.602-8-7.602zm0 11c-1.657 0-3-1.343-3-3s1.343-3 3-3 3 1.343 3 3-1.343 3-3 3z"/>
        </symbol>
        <symbol id="icon-phone" viewBox="0 0 24 24">
            <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </symbol>
    </svg>

    <div class="container">

        <!-- Nagłówek -->
        <header class="brand-section fade-in-up delay-1">
            <h1>DOM PIĘKNA</h1>
            <p class="subtitle">Stylizacja paznokci</p>
        </header>

        <!-- Główny profil Instagram -->
        <div class="profile-group fade-in-up delay-2">
            <a
                href="https://instagram.com/dom.piekna_tarnobrzeg"
                target="_blank"
                rel="noopener noreferrer"
                class="ig-link main-profile"
                aria-label="Profil salonu Dom Piękna na Instagramie (otwiera nową kartę)"
            >
                <svg aria-hidden="true"><use href="#icon-instagram"></use></svg>
                <span>Instagram</span>
            </a>
        </div>

        <!-- Separator -->
        <div class="divider-text fade-in-up delay-3" aria-hidden="true">
            Zarezerwuj chwilę luksusu dla siebie
        </div>

        <!-- Sekcja Stylistek -->
        <section aria-label="Nasze stylistki" class="team-section">
            <div class="stylist-column fade-in-up delay-4">
                <span class="profile-label" id="label-natalia">Stylistka Natalia</span>
                <a
                    href="https://instagram.com/dompiekna_nataliasmutek"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="ig-link"
                    aria-labelledby="label-natalia"
                    aria-label="Instagram Natalii Smutek (otwiera nową kartę)"
                >
                    <svg aria-hidden="true"><use href="#icon-instagram"></use></svg>
                    <span>Instagram</span>
                </a>
                <a
                    href="#"
                    class="phone-link"
                    aria-label="Zadzwoń do Natalii"
                >
                    <svg aria-hidden="true"><use href="#icon-phone"></use></svg>
                    <span id="phone-natalia">Pokaż numer</span>
                </a>
            </div>

            <div class="stylist-column fade-in-up delay-5">
                <span class="profile-label" id="label-klaudia">Stylistka Klaudia</span>
                <a
                    href="https://instagram.com/dompiekna_klaudiaadamiec"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="ig-link"
                    aria-label="Instagram Klaudii Adamiec (otwiera nową kartę)"
                >
                    <svg aria-hidden="true"><use href="#icon-instagram"></use></svg>
                    <span>Instagram</span>
                </a>
                <a
                    href="#"
                    class="phone-link"
                    aria-label="Zadzwoń do Klaudii"
                >
                    <svg aria-hidden="true"><use href="#icon-phone"></use></svg>
                    <span id="phone-klaudia">Pokaż numer</span>
                </a>
            </div>
        </section>

        <!-- Separator -->
        <div class="divider-text fade-in-up delay-6" aria-hidden="true">
            Gdzie nas znajdziesz
        </div>

        <!-- Sekcja z adresem i mapą -->
        <section aria-label="Lokalizacja salonu" class="location-section fade-in-up delay-7">
            <a
                href="https://www.google.com/maps/search/?api=1&query=J%C3%B3zefa+Pi%C5%82sudskiego+10D,+39-400+Tarnobrzeg"
                target="_blank"
                rel="noopener noreferrer"
                class="address-card"
                aria-label="Otwórz adres w Google Maps: ul. Józefa Piłsudskiego 10D, Tarnobrzeg (otwiera nową kartę)"
            >
                <svg aria-hidden="true"><use href="#icon-location"></use></svg>
                <div class="address-details">
                    <strong>Dom Piękna</strong>
                    ul. Józefa Piłsudskiego 10D<br>
                    39-400 Tarnobrzeg
                </div>
                <span class="address-hint">↗ Otwórz w Google Maps</span>
            </a>

            <div class="map-container">
                <div id="map" role="application" aria-label="Mapa lokalizacji salonu Dom Piękna"></div>
            </div>
        </section>

    </div>

    <script>
        function initMap() {
            const lat = 50.5765;
            const lng = 21.6836;

            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            const map = L.map('map', {
                center: [lat, lng],
                zoom: 16,
                zoomControl: true,
                scrollWheelZoom: false,
                dragging: !isMobile,
            });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19,
            }).addTo(map);

            // Pobieramy aktualne zmienne CSS dla kolorów
            const computedStyle = getComputedStyle(document.documentElement);
            const goldColor = computedStyle.getPropertyValue('--gold').trim() || '#C5A059';
            const bgColor = computedStyle.getPropertyValue('--bg-color').trim() || '#ffffff';

            const goldIcon = L.divIcon({
                html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="28" height="42">
                    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 24 12 24S24 21 24 12C24 5.373 18.627 0 12 0z" fill="${goldColor}"/>
                    <circle cx="12" cy="12" r="5" fill="${bgColor}"/>
                </svg>`,
                className: '',
                iconSize: [28, 42],
                iconAnchor: [14, 42],
                popupAnchor: [0, -44],
            });

            L.marker([lat, lng], { icon: goldIcon })
                .addTo(map)
                .bindPopup('<b>DOM PIĘKNA</b><br>ul. Piłsudskiego 10D<br>Tarnobrzeg')
                .openPopup();
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" onload="initMap()"></script>

    <script>
        (function() {
            const phones = {
                'phone-natalia': ['+48', '730', '610', '555'],
                'phone-klaudia': ['+48', '786', '812', '820']
            };

            Object.entries(phones).forEach(([id, parts]) => {
                const el = document.getElementById(id);
                if (!el) return;
                
                const parent = el.closest('a');
                if (!parent) return;
                
                const number = parts.join('').replace(/\s/g, '');
                parent.setAttribute('href', 'tel:' + number);
                
                const name = id === 'phone-natalia' ? 'Natalii' : 'Klaudii';
                const formattedNumber = parts.slice(1).join(' ');
                parent.setAttribute('aria-label', `Zadzwoń do ${name}: ${formattedNumber}`);
                
                el.textContent = formattedNumber.replace(/ /g, '\u00A0');
            });
        })();
    </script>

</body>
</html>
